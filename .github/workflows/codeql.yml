name: CodeQL

# Static analysis for TypeScript / JavaScript. Findings appear in
# Security → Code scanning. We use the security-and-quality query suite
# instead of the default to catch more issues at the cost of some noise.
#
# Triggers:
#   - PR to main: incremental scan, fails the PR on new high-severity findings
#   - push to main: baseline rebuild
#   - schedule: weekly full scan (catches new queries shipped by GitHub)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Off-peak Sunday — keeps weekday Actions queue free.
    - cron: '17 3 * * 0'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Init the CodeQL DB before any build/install runs so it can
      # auto-instrument the install + build for indirect-flow tracking.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality > security-extended > security (default).
          # We accept the noise budget for a public SDK.
          queries: security-and-quality
          # Exclude generated files / vendored code / docs to keep noise down.
          config: |
            paths-ignore:
              - '**/dist/**'
              - '**/.next/**'
              - '**/.source/**'
              - '**/coverage/**'
              - '**/node_modules/**'
              - 'apps/docs/**'

      # CodeQL needs to observe the build to extract type info accurately.
      # We do a packages-only build so apps/* don't bloat the DB.
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm --filter "./packages/*" build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          category: '/language:${{ matrix.language }}'
