name: Release

on:
  push:
    branches: [main]

# Only one Release run can be in flight per ref. We do NOT cancel-in-progress
# here — interrupting a publish that already wrote half the npm tarballs would
# leave the registry in an inconsistent state.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Top-level locks to read-only. The `release` job below escalates only what
# it actually needs (contents:write for tags + Releases, pull-requests:write
# for the version PR, id-token:write for npm provenance via OIDC).
permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # --------------------------------------------------------------------------
  # Gate: re-runs the *full* validation suite on the merge commit. Calls the
  # same reusable workflow as `ci.yml`, but with the FULL OS × Node matrix —
  # publish should never fire from a commit that hasn't passed cross-platform.
  # --------------------------------------------------------------------------
  gate:
    name: Pre-release validation
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
    with:
      matrix-os: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      matrix-node: '["20", "22"]'
      run-package-quality: true
      run-coverage: false
      run-examples-typecheck: true
    secrets:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

  release:
    name: Version PR or publish
    needs: gate
    runs-on: ubuntu-latest
    # Publish retries can wait minutes between attempts (npm 429 backoff).
    timeout-minutes: 60
    permissions:
      contents: write       # version-packages PR + git tags + GitHub Releases
      pull-requests: write  # open / update the "Version Packages" PR
      id-token: write       # required for npm provenance (OIDC sigstore)
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          # `audit` lets the run complete and reports unexpected egress in
          # the workflow summary. Flip to `block` once the allowlist is
          # tuned (npm registry, GitHub API, sigstore, codecov, etc).
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          # Match the token passed to `changesets/action` below. When
          # `RELEASE_BOT_TOKEN` is unset, this is `GITHUB_TOKEN` (default)
          # and the version PR does not re-trigger CI (GitHub cascade rule).
          # When set, use a bot PAT so the version PR runs full CI and
          # branch-protection + auto-merge can complete.
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # NOTE: intentionally NOT setting `registry-url` on setup-node.
      # When `registry-url` is set, setup-node writes a project .npmrc with a
      # literal `${NODE_AUTH_TOKEN}` placeholder AND points NPM_CONFIG_USERCONFIG
      # at it — which then shadows the fully-resolved `~/.npmrc` that
      # changesets/action writes. The placeholder substitution is fragile across
      # pnpm subprocesses and was the cause of the v0.1.2 publish 404 in CI.
      # Letting changesets/action be the single owner of `~/.npmrc` is reliable.
      - uses: ./.github/actions/setup-pnpm-node

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      # Explicitly configure npm auth BEFORE changesets/action runs.
      # We've seen ~/.npmrc written by changesets/action get rejected with
      # opaque 404s in CI even though local `changeset publish` against the
      # same NPM_TOKEN works. Writing the file ourselves with the registry
      # line included, then verifying with `npm whoami`, gives us a hard
      # signal whether the auth path is at fault before any publish runs.
      #
      # SECURITY: NEVER `set -x` here. Token is wired via env (no echo) and
      # piped through tee /dev/null to suppress incidental command echo.
      - name: Configure npm auth + verify
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          umask 077
          # Use printf with %s so the token never appears in shell trace
          # output even if a future maintainer enables `set -x` for debug.
          printf '//registry.npmjs.org/:_authToken=%s\nregistry=https://registry.npmjs.org/\nalways-auth=true\n' "${NPM_TOKEN}" > "${HOME}/.npmrc"
          echo "Wrote ~/.npmrc ($(wc -c < "${HOME}/.npmrc") bytes, mode $(stat -c '%a' "${HOME}/.npmrc" 2>/dev/null || stat -f '%A' "${HOME}/.npmrc"))"
          echo "--- npm whoami ---"
          npm whoami
          echo "--- npm token check OK ---"

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          # Auto-create a GitHub Release per published package, with the
          # changelog body extracted from the package's CHANGELOG.md.
          # Tag format: `<package-name>@<version>` (matches changesets default).
          createGithubReleases: true
        env:
          # Prefer `RELEASE_BOT_TOKEN` (classic PAT: `repo` + `workflow` on a
          # machine user) so the opened "version packages" PR is not authored
          # via the workflow `GITHUB_TOKEN`, which does not trigger downstream
          # workflows. Falls back to `GITHUB_TOKEN` until the secret exists.
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          # changesets/action reads NPM_TOKEN and writes ~/.npmrc with the
          # actual token value (not a placeholder), then runs `pnpm release`.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # `pnpm release` runs `scripts/changeset-publish-retry.js` — tune for npm rate limits.
          CHANGESET_PUBLISH_MAX_ATTEMPTS: '14'
          CHANGESET_PUBLISH_BASE_DELAY_MS: '60000'
          CHANGESET_PUBLISH_MAX_DELAY_MS: '900000'
          NPM_CONFIG_MAXSOCKETS: '1'
          # ----------------------------------------------------------------
          # PROVENANCE STATUS
          # ----------------------------------------------------------------
          # Currently disabled because the active NPM_TOKEN is a classic
          # automation token without `id-token: write` -> sigstore mapping,
          # and auto-enabling provenance under `id-token: write` causes PUT
          # to return 404 (auth failure). To re-enable:
          #
          #   1. Migrate to npm "Trusted Publishers" (OIDC) — bind this repo
          #      + workflow file in the npm package settings.
          #   2. Remove NPM_TOKEN from secrets (no longer needed).
          #   3. Set NPM_CONFIG_PROVENANCE: "true" below.
          #
          # See RELEASING.md > "Enabling provenance" for the migration steps.
          NPM_CONFIG_PROVENANCE: "false"

      # Surface the published packages in the workflow summary so the run page
      # is useful at a glance (otherwise you have to dig into the changesets
      # action log to see what got published).
      - name: Summarize publish
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "### Published packages"
            echo ""
            echo '```json'
            echo "${PUBLISHED_PACKAGES}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note version PR
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.published != 'true'
        run: |
          echo "### Version PR opened/updated" >> "$GITHUB_STEP_SUMMARY"
          echo "Merge the \`chore(release): version packages\` PR to publish." >> "$GITHUB_STEP_SUMMARY"

      # Verify provenance attestations on the just-published tarballs. No-op
      # while provenance is disabled; flips to a real check the moment we
      # migrate to Trusted Publishers and set NPM_CONFIG_PROVENANCE: "true".
      - name: Verify package signatures
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -euo pipefail
          # `npm audit signatures` walks the lockfile and verifies sigstore
          # attestations for each tarball. Exit-zero whether attestations
          # exist or not, just surface the report.
          npm audit signatures || true
