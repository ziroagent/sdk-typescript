name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      # NOTE: intentionally NOT setting `registry-url` on setup-node.
      # When `registry-url` is set, setup-node writes a project .npmrc with a
      # literal `${NODE_AUTH_TOKEN}` placeholder AND points NPM_CONFIG_USERCONFIG
      # at it — which then shadows the fully-resolved `~/.npmrc` that
      # changesets/action writes. The placeholder substitution is fragile across
      # pnpm subprocesses and was the cause of the v0.1.2 publish 404 in CI.
      # Letting changesets/action be the single owner of `~/.npmrc` is reliable.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action reads NPM_TOKEN and writes ~/.npmrc with the
          # actual token value (not a placeholder), then runs `pnpm release`.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Disable npm provenance: the current NPM_TOKEN does not have
          # OIDC sigstore permissions, and auto-enabling provenance under
          # `id-token: write` causes PUT to return 404 (auth failure).
          # Re-enable later by issuing a granular token with write+attest.
          NPM_CONFIG_PROVENANCE: "false"
