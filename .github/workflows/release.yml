name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      # NOTE: intentionally NOT setting `registry-url` on setup-node.
      # When `registry-url` is set, setup-node writes a project .npmrc with a
      # literal `${NODE_AUTH_TOKEN}` placeholder AND points NPM_CONFIG_USERCONFIG
      # at it — which then shadows the fully-resolved `~/.npmrc` that
      # changesets/action writes. The placeholder substitution is fragile across
      # pnpm subprocesses and was the cause of the v0.1.2 publish 404 in CI.
      # Letting changesets/action be the single owner of `~/.npmrc` is reliable.
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build

      # Explicitly configure npm auth BEFORE changesets/action runs.
      # We've seen ~/.npmrc written by changesets/action get rejected with
      # opaque 404s in CI even though local `changeset publish` against the
      # same NPM_TOKEN works. Writing the file ourselves with the registry
      # line included, then verifying with `npm whoami`, gives us a hard
      # signal whether the auth path is at fault before any publish runs.
      - name: Configure npm auth + verify
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
          } > "${HOME}/.npmrc"
          chmod 600 "${HOME}/.npmrc"
          echo "Wrote ~/.npmrc ($(wc -c < "${HOME}/.npmrc") bytes)"
          echo "--- npm whoami ---"
          npm whoami
          echo "--- npm token check OK ---"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # changesets/action reads NPM_TOKEN and writes ~/.npmrc with the
          # actual token value (not a placeholder), then runs `pnpm release`.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Disable npm provenance: the current NPM_TOKEN does not have
          # OIDC sigstore permissions, and auto-enabling provenance under
          # `id-token: write` causes PUT to return 404 (auth failure).
          # Re-enable later by issuing a granular token with write+attest.
          NPM_CONFIG_PROVENANCE: "false"
