name: _validate

# Reusable workflow that runs the FULL validation suite — lint + matrix
# build/test/typecheck + package quality. Called by:
#   - ci.yml         (push/PR to main)
#   - release.yml    (gate before publish)
#   - nightly.yml    (full OS matrix + integration tests)
#
# Centralizing the contract here means CI and Release can never drift —
# anything that lands on `main` has cleared the same gate the publish
# step will re-run. If you bump a step here, every caller benefits.
#
# Inputs let callers tune the matrix and skip expensive jobs in cheap
# contexts (e.g. PR runs single-OS, nightly runs full grid).

on:
  workflow_call:
    inputs:
      matrix-os:
        description: 'JSON array of runner OSes for build-test matrix.'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      matrix-node:
        description: 'JSON array of Node versions for build-test matrix.'
        required: false
        type: string
        default: '["20", "22"]'
      run-package-quality:
        description: 'Run publint + attw on every package.'
        required: false
        type: boolean
        default: true
      run-coverage:
        description: 'Generate vitest coverage and upload to Codecov.'
        required: false
        type: boolean
        default: false
      run-examples-typecheck:
        description: 'Typecheck every package in examples/ to catch consumer breaks.'
        required: false
        type: boolean
        default: true
      ref:
        description: 'Git ref to check out. Defaults to the caller workflow ref.'
        required: false
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        description: 'Codecov upload token (optional — public repos can use OIDC).'
        required: false
      TURBO_TOKEN:
        description: 'Turbo Remote Cache token (optional, big perf win when set).'
        required: false

# All jobs run with read-only token by default. Anything that needs more
# (e.g. Codecov OIDC) bumps it locally per step.
permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # --------------------------------------------------------------------------
  # Lint runs once on the cheapest runner — Biome is deterministic across OS.
  # --------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
      - run: pnpm lint

  # --------------------------------------------------------------------------
  # Build / test / typecheck across the requested OS × Node matrix.
  # `fail-fast: false` so a Windows-only flake doesn't kill the Linux logs
  # which are usually the easier signal to debug.
  # --------------------------------------------------------------------------
  build-test:
    name: Build & test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.matrix-os) }}
        node: ${{ fromJSON(inputs.matrix-node) }}
    steps:
      - name: Harden runner
        # harden-runner only runs on ubuntu — silently no-ops elsewhere.
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ matrix.node }}

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Typecheck packages
        run: pnpm --filter "./packages/*" typecheck

      - name: Run tests (no coverage)
        if: ${{ !inputs.run-coverage || matrix.os != 'ubuntu-latest' || matrix.node != '22' }}
        run: pnpm --filter "./packages/*" test

      - name: Run tests with coverage
        if: ${{ inputs.run-coverage && matrix.os == 'ubuntu-latest' && matrix.node == '22' }}
        run: pnpm --filter "./packages/*" test -- --coverage --coverage.reporter=lcov --coverage.reporter=text-summary

      - name: Upload coverage to Codecov
        if: ${{ inputs.run-coverage && matrix.os == 'ubuntu-latest' && matrix.node == '22' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          # Coverage is emitted per-package under packages/*/coverage/lcov.info.
          files: ./packages/agent/coverage/lcov.info,./packages/core/coverage/lcov.info,./packages/tools/coverage/lcov.info,./packages/workflow/coverage/lcov.info,./packages/memory/coverage/lcov.info,./packages/tracing/coverage/lcov.info,./packages/eval/coverage/lcov.info,./packages/middleware/coverage/lcov.info,./packages/cli/coverage/lcov.info
          flags: unit
          verbose: false

      # Persist the per-OS dist/ so package-quality can re-use it instead of
      # rebuilding from scratch. Only need ONE OS's artifact (publint/attw
      # are platform-independent).
      - name: Upload dist artifact (ubuntu / Node 22 only)
        if: ${{ inputs.run-package-quality && matrix.os == 'ubuntu-latest' && matrix.node == '22' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-dist
          path: |
            packages/*/dist
            packages/*/package.json
          retention-days: 1
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Package quality: publint catches package.json shape issues; attw catches
  # broken type-resolution under different consumer module systems
  # (CJS / ESM / bundler / node10/16). Both are non-negotiable before publish.
  # --------------------------------------------------------------------------
  package-quality:
    name: Package quality (publint + attw)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test
    if: ${{ inputs.run-package-quality }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node

      # Reuse the dist/ from build-test instead of rebuilding (~3 min saved).
      # Falls back to a fresh build if the artifact is missing — guards
      # against the race where build-test was skipped or expired.
      - name: Download dist artifact
        id: download-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: packages-dist
          path: packages

      - name: Rebuild if artifact missing
        if: steps.download-dist.outcome != 'success'
        run: pnpm --filter "./packages/*" build

      - run: pnpm --filter "./packages/*" publint
      - run: pnpm --filter "./packages/*" attw

  # --------------------------------------------------------------------------
  # Typecheck examples to catch breaking changes in our public API. Examples
  # consume the SDK exactly like end-users would, so a typecheck failure
  # here is a strong signal that a "patch" change is actually breaking.
  # --------------------------------------------------------------------------
  examples-typecheck:
    name: Examples typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test
    if: ${{ inputs.run-examples-typecheck }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node

      - name: Download dist artifact
        id: download-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: packages-dist
          path: packages

      - name: Rebuild if artifact missing
        if: steps.download-dist.outcome != 'success'
        run: pnpm --filter "./packages/*" build

      - name: Typecheck examples
        # `--if-present` lets us skip examples without a typecheck script
        # (some examples are runtime-only smoke tests).
        run: pnpm --filter "./examples/*" --if-present typecheck

  # --------------------------------------------------------------------------
  # Docs site — TypeDoc HTML + Next.js static export (RFC 0004 §v0.1.9).
  # Reuses package dist/ from build-test so TypeDoc resolves published types.
  # --------------------------------------------------------------------------
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-test
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm-node

      - name: Download dist artifact
        id: download-dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: packages-dist
          path: packages

      - name: Rebuild if artifact missing
        if: steps.download-dist.outcome != 'success'
        run: pnpm --filter "./packages/*" build

      - name: Build docs site
        run: pnpm --filter @ziro-agent/docs build

  # --------------------------------------------------------------------------
  # Aggregate gate — succeeds only when all jobs above succeeded (or were
  # legitimately skipped via inputs). Branch protection should require
  # `Validate / Validation summary` instead of every individual job, so
  # toggling matrix size here doesn't require touching repo settings.
  # --------------------------------------------------------------------------
  summary:
    name: Validation summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [lint, build-test, package-quality, examples-typecheck, docs]
    if: always()
    steps:
      - name: Compute outcome
        env:
          LINT: ${{ needs.lint.result }}
          BUILD: ${{ needs.build-test.result }}
          PKG: ${{ needs.package-quality.result }}
          EX: ${{ needs.examples-typecheck.result }}
          DOCS: ${{ needs.docs.result }}
        run: |
          set -euo pipefail
          fail=0
          for name_var in "lint:$LINT" "build-test:$BUILD" "package-quality:$PKG" "examples-typecheck:$EX" "docs:$DOCS"; do
            name="${name_var%%:*}"
            res="${name_var##*:}"
            case "$res" in
              success|skipped) echo "ok   $name ($res)" ;;
              *)               echo "FAIL $name ($res)"; fail=1 ;;
            esac
          done
          {
            echo "### Validation summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Lint              | ${LINT} |"
            echo "| Build & test      | ${BUILD} |"
            echo "| Package quality   | ${PKG} |"
            echo "| Examples typecheck| ${EX} |"
            echo "| Docs build         | ${DOCS} |"
          } >> "${GITHUB_STEP_SUMMARY}"
          exit "$fail"
