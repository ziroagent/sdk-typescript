name: CI

# Pull-request gate. Calls the reusable `_validate.yml` workflow with a
# trimmed matrix to keep PR feedback fast and runner-minute spend low:
#   - PR / push: ubuntu-latest × Node {20, 22}     (2 jobs)
#   - Full grid (3 OS × 2 Node) is run by `nightly.yml` and `release.yml gate`
#
# This trade-off is intentional. Cross-OS bugs in this codebase are rare
# (no native modules, no shell scripts in package code) — when they do
# happen, nightly catches them within 24h and the same-day fix can ride
# a normal PR. Forcing every PR to wait on macOS + Windows runners adds
# 20-30 min to feedback for ~0.1% bug catch rate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI when a new commit lands on the same PR/branch.
# Safe because CI has no side effects (publish lives in release.yml).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only token. The reusable workflow inherits via secrets.
permissions:
  contents: read

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/_validate.yml
    permissions:
      contents: read
    with:
      matrix-os: '["ubuntu-latest"]'
      matrix-node: '["20", "22"]'
      run-package-quality: true
      run-coverage: true
      run-examples-typecheck: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
