name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress CI runs on the same ref when a new commit lands.
# `github.ref` covers both pushes (refs/heads/dev) and PRs (refs/pull/N/merge),
# so feature-branch PR retriggers don't pile up while `dev` and `main` runs
# stay independent.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Pin pnpm to the exact version declared in package.json#packageManager.
      # Without `version`, action-setup@v6 resolves "latest" which currently
      # picks pnpm 11.x — and pnpm 11 imports `node:sqlite` for its store
      # implementation, breaking on Node 20 AND on Node 22 minor releases
      # without `--experimental-sqlite` (see CI failure run 24668062535).
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-test:
    name: Build & test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter "./packages/*" typecheck
      - run: pnpm --filter "./packages/*" test

  package-quality:
    name: Package quality (attw + publint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "./packages/*" build
      - run: pnpm --filter "./packages/*" publint
      - run: pnpm --filter "./packages/*" attw
