name: Pricing drift

# Detects when entries in `packages/core/src/pricing/data.ts` are stale —
# providers update their token pricing periodically and we need a forcing
# function to re-verify before quotes drift away from reality.
#
# Outcomes:
#   - Schedule (Mon 09:00 UTC): if drift detected, open OR comment on a
#     `pricing-drift` tracking issue (one open at a time, deduped).
#   - Manual dispatch: same as schedule but with overridable threshold.
#   - Pull request (touching pricing files): annotate the diff with a
#     warning so the reviewer sees freshness alongside the change. Never
#     fails — this is signal, not a blocker.

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      staleness_days:
        description: 'Override the default staleness threshold (days).'
        required: false
        default: '60'
  pull_request:
    paths:
      - 'packages/core/src/pricing/data.ts'
      - 'scripts/check-pricing-drift.ts'

permissions:
  contents: read

jobs:
  check:
    name: Check pricing freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write   # only used by the schedule path to file/refresh tracking issue
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            nodejs.org:443
            registry.npmjs.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # NOTE: we deliberately use .nvmrc (Node 22.13.0) instead of a hardcoded
      # `node-version: '22'` so this job can't drift away from the rest of
      # the matrix. `--experimental-strip-types` requires Node 22.6+.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Run drift check
        id: drift
        env:
          STALENESS_DAYS: ${{ github.event.inputs.staleness_days || '60' }}
        run: |
          set +e
          node --experimental-strip-types scripts/check-pricing-drift.ts | tee drift.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Annotate stale entries
        if: steps.drift.outputs.exit_code == '1'
        run: |
          echo "::warning title=Pricing drift detected::One or more entries in packages/core/src/pricing/data.ts are older than the staleness threshold. See logs."
          # Intentionally do NOT fail the job — drift is a reminder, not a
          # blocker. The annotation surfaces in the PR Files-changed view.

      - name: Open / refresh tracking issue (scheduled runs only)
        if: steps.drift.outputs.exit_code == '1' && github.event_name == 'schedule'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = [
              '## Pricing drift detected',
              '',
              'Weekly drift check found stale entries in `packages/core/src/pricing/data.ts`:',
              '',
              '```',
              fs.readFileSync('drift.log', 'utf8'),
              '```',
              '',
              'Re-verify the listed models against the live provider pricing pages and bump `VALID_FROM`.',
            ].join('\n');
            const title = 'pricing: drift detected (weekly check)';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pricing-drift',
              state: 'open',
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['pricing-drift'],
              });
            }

      - name: Fail the job on script error
        if: steps.drift.outputs.exit_code == '2'
        run: |
          echo '::error::Pricing drift script failed (exit 2). See logs.'
          exit 1
