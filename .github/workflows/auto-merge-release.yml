name: Auto-merge release PR

# Triggered when the changesets/action step opens / updates the
# "Version Packages" PR. Enables GitHub's native auto-merge so the PR
# merges into `main` automatically once required status checks pass —
# `release.yml` then runs the publish step on the merge commit.
#
# This workflow ONLY targets PRs that match ALL of:
#   - source branch `changeset-release/main` (changesets/action default)
#   - title starts with `chore(release): version packages`
#   - head repository == base repository (defends against fork PRs that
#     spoof the branch name)
#
# We intentionally do NOT require `github-actions[bot]` as the PR author:
# when `release.yml` uses `RELEASE_BOT_TOKEN`, the author is the PAT's user.
#
# Any other PR — human-authored or otherwise — is ignored.
#
# Branch-protection requirement (recommended):
#   To make auto-merge actually WAIT for CI green, configure
#   Settings → Branches → main → "Require status checks to pass"
#   and pick `Validate / Validation summary`. Without branch protection,
#   GitHub's auto-merge will merge as soon as the PR is mergeable
#   (i.e. immediately) which defeats the purpose.
#
# Repo setting requirement (mandatory):
#   Settings → General → Pull Requests → "Allow auto-merge" must be
#   ON, otherwise `gh pr merge --auto` returns:
#       "Auto-merge is not allowed for this repository"
#
# CRITICAL — cascade gotcha (read RELEASING.md > "Known gotcha"):
#   By default `changesets/action` opens the version PR with
#   GITHUB_TOKEN, and GitHub does NOT trigger downstream workflows on
#   PRs created via GITHUB_TOKEN. CI therefore never auto-runs on the
#   bot's PR, branch-protection's required checks are never satisfied,
#   and `gh pr merge --auto` (this workflow) waits forever.
#   Fix by swapping changesets/action's GITHUB_TOKEN to a PAT or
#   GitHub App token. See RELEASING.md for the two recipes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]

# Single in-flight enable per PR is enough — `gh pr merge --auto` is
# idempotent so re-runs on `synchronize` just no-op. We DO want to
# cancel-in-progress on rapid synchronize bursts (changesets often
# pushes 2-3 commits in quick succession when multiple changesets
# accumulate).
concurrency:
  group: auto-merge-release-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    # Hard guard: bail out before the API call when this PR is not the
    # changesets release PR. Saves a token and keeps logs clean for the
    # 99% of PRs this workflow doesn't care about.
    #
    # `head.repo.full_name == base.repo.full_name` defends against a fork
    # PR that names its branch `changeset-release/main` to game the filter
    # — fork PRs always have a different head repo.
    if: >-
      github.event.pull_request.head.ref == 'changeset-release/main' &&
      github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name &&
      startsWith(github.event.pull_request.title, 'chore(release): version packages')
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
          # Only api.github.com is needed for `gh pr merge --auto`.
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # `gh pr merge --auto` is idempotent — calling it on a PR that
        # already has auto-merge enabled is a no-op exit-zero. Squash
        # mirrors how a human would normally land changesets PRs so the
        # main-branch history stays one commit per release.
        run: |
          set -euo pipefail
          echo "Enabling auto-merge on ${PR_URL}"
          gh pr merge --auto --squash "${PR_URL}"
          echo "::notice::Auto-merge enabled. PR will merge once required checks pass."
          {
            echo "### Auto-merge enabled"
            echo ""
            echo "PR: ${PR_URL}"
            echo ""
            echo "Will merge automatically once branch-protection checks pass."
            echo "Bypass: dismiss the PR's auto-merge from the GitHub UI to halt."
          } >> "${GITHUB_STEP_SUMMARY}"
