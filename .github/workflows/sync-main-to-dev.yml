name: Sync main -> dev

# After every push to `main` (typically: a `dev → main` PR landed, OR the
# changesets bot's "Version Packages" PR auto-merged and `release.yml`
# pushed version bumps + tags), back-merge `main` into `dev` so the
# integration branch never falls behind.
#
# Strategy:
#   1. Try a fast-forward push of `main` onto `dev` (cheap, common case
#      when no concurrent dev work happened during the release).
#   2. If fast-forward fails (dev has commits main doesn't), open a
#      "chore(sync): main -> dev" PR for human review instead of
#      attempting an auto-merge — merge conflicts during sync should be
#      resolved by the contributor who introduced the divergence, not
#      a bot.
#
# IMPORTANT — token cascade:
#   By default GitHub does NOT trigger downstream workflows on commits /
#   PRs created via `GITHUB_TOKEN`. That means:
#     - the fast-forward push WILL bypass CI on `dev` (acceptable: the
#       commits already passed CI on main).
#     - the fallback PR (if opened) will NOT auto-trigger CI on `dev`.
#       Reviewer must close + reopen the PR (or push an empty commit)
#       to kick CI.
#   To get full CI cascade, swap GITHUB_TOKEN for a PAT or GitHub App
#   token here AND in `auto-merge-release.yml`. See `RELEASING.md` >
#   "Known gotcha".

on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab if a previous run failed and
  # you want to retry without pushing a new commit to main.
  workflow_dispatch:

# Only one sync attempt at a time per ref. Cancel in-flight runs when
# a newer push lands so we always sync the latest main tip.
concurrency:
  group: sync-main-to-dev
  cancel-in-progress: true

permissions:
  contents: write       # push to dev (fast-forward path) + create branch (PR fallback)
  pull-requests: write  # open the fallback PR

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  sync:
    name: Fast-forward dev or open PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so the fast-forward attempt and PR diff
          # both have all commits available locally.
          fetch-depth: 0
          # Check out main; we'll branch from here for the PR fallback.
          ref: main
          # Persist credentials so subsequent `git push` calls
          # authenticate against GITHUB_TOKEN automatically.
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Try fast-forward main -> dev
        id: ff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Fetch dev so we know its tip locally.
          git fetch origin dev:dev
          MAIN_SHA=$(git rev-parse main)
          DEV_SHA=$(git rev-parse dev)
          echo "main: ${MAIN_SHA}"
          echo "dev:  ${DEV_SHA}"

          if [ "${MAIN_SHA}" = "${DEV_SHA}" ]; then
            echo "dev is already at main — nothing to sync."
            echo "result=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Is dev an ancestor of main? If yes, fast-forward is safe.
          if git merge-base --is-ancestor "${DEV_SHA}" "${MAIN_SHA}"; then
            echo "dev is behind main — fast-forwarding."
            git push origin "main:dev"
            echo "result=fastforward" >> "$GITHUB_OUTPUT"
          else
            echo "dev has commits not on main — fast-forward not possible."
            echo "result=diverged" >> "$GITHUB_OUTPUT"
          fi

      - name: Open back-merge PR (fallback when diverged)
        if: steps.ff.outputs.result == 'diverged'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/sync-main-to-dev-$(date -u +%Y%m%dT%H%M%S)"
          # Create a branch from current main for the PR.
          git checkout -b "${BRANCH}" main
          git push origin "${BRANCH}"

          # Open the PR. `gh` exits non-zero if a PR with the same head
          # already exists; the `|| true` swallows that idempotently.
          BODY=$(printf '%s\n' \
            'Auto-generated back-merge PR.' \
            '' \
            '`main` advanced (most likely: a release was published) but `dev` has' \
            'commits that are not on `main`, so a fast-forward is not possible.' \
            '' \
            'Please resolve any conflicts and merge so `dev` stays current with' \
            'the released version of the SDK.' \
            '' \
            'Generated by `.github/workflows/sync-main-to-dev.yml`.')

          gh pr create \
            --base dev \
            --head "${BRANCH}" \
            --title "chore(sync): main -> dev" \
            --body "${BODY}" \
            --label "automerge:dev" \
            || echo "::notice::Sync PR may already exist for this main tip — skipping create."

          {
            echo "### Sync PR opened"
            echo ""
            echo "main and dev have diverged; opened a back-merge PR for review."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Summary (fast-forward / no-op)
        if: steps.ff.outputs.result != 'diverged'
        run: |
          {
            echo "### Sync result: ${{ steps.ff.outputs.result }}"
            echo ""
            if [ "${{ steps.ff.outputs.result }}" = "fastforward" ]; then
              echo "\`dev\` was fast-forwarded to the latest \`main\` tip."
            else
              echo "\`dev\` is already at \`main\` — no sync needed."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
