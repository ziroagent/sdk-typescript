version: 2

# Dependabot config notes:
#   - npm grouping reduces PR churn — major bumps still come as solo PRs.
#   - github-actions ecosystem is critical: every action used in workflows
#     is locked by SHA in the workflow file, so dependabot's job here is
#     to bump the SHA + comment-tag annotation atomically. Keep limit
#     low so we don't drown in micro-bumps.
#   - For pnpm specifically, dependabot uses the npm-compatible
#     resolution layer; lockfile updates happen via `pnpm install`.

updates:
  # ----------------------------------------------------------------------
  # npm — every package + the workspace root via shared lockfile.
  # ----------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    commit-message:
      # NOTE: `include: scope` makes Dependabot append its own scope
      # (e.g. `(deps)` / `(deps-dev)`) to the prefix. If `prefix` ALSO
      # contains `(...)` we end up with double-scope titles like
      # `chore(deps)(deps): ...` which commitlint rejects. Keep the
      # prefix as a bare type and let `include: scope` do the scoping.
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      types:
        applies-to: version-updates
        patterns:
          - "@types/*"
        update-types:
          - patch
          - minor
      dev-deps:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - patch
          - minor
      # Build / test toolchain bumps land together so we only validate
      # the matrix once per week.
      tooling:
        applies-to: version-updates
        patterns:
          - "tsup"
          - "turbo"
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "@biomejs/*"
        update-types:
          - patch
          - minor
    ignore:
      # Avoid auto-bumping pnpm itself across majors — pnpm 11.x broke
      # us once on a node:sqlite import (see comment in setup composite).
      - dependency-name: "pnpm"
        update-types: ["version-update:semver-major"]
      # Toolchain majors: land via an explicit RFC + matrix burn-in, not
      # a solo Dependabot PR (see closed PRs #22 / #23).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # ----------------------------------------------------------------------
  # GitHub Actions — bumps SHA pin + version comment in lockstep.
  # ----------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      # Same bare-type rule as the npm block above. Ecosystem is
      # already signalled by the `github-actions` label — reviewers
      # can filter on that. Produces e.g.
      #   chore(deps): bump actions/checkout from A to B
      prefix: chore
      include: scope
    groups:
      actions-minor:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  # ----------------------------------------------------------------------
  # Same config for the composite action's pinned actions — dependabot
  # walks `.github/actions/**/action.yml` automatically when this entry
  # exists at the repo root.
  # ----------------------------------------------------------------------
